<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今天也在努力不当嘉豪 - Galgame</title>
  
  <!-- 引入谷歌字体，提升排版美感 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    /* ==========================================================================
       1. 核心复位与变量设计 (Theme Variables & Base Reset)
       ========================================================================== */
    :root {
      --primary-neon: #a855f7;      /* 紫色霓虹 */
      --primary-glow: rgba(168, 85, 247, 0.4);
      --accent-neon: #ec4899;       /* 粉红霓虹 */
      --accent-glow: rgba(236, 72, 153, 0.4);
      
      --bg-dark: #09090b;           /* 极暗背景 */
      --text-main: #f4f4f5;         /* 主要文字 */
      --text-muted: #a1a1aa;        /* 辅助暗字 */
      
      --glass-bg: rgba(15, 15, 25, 0.65);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-highlight: rgba(255, 255, 255, 0.15);
      
      --font-family: 'Noto Sans SC', 'Outfit', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent; /* 消除移动端点击蓝色阴影 */
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: var(--font-family);
      overflow: hidden;
      position: relative;
      user-select: none;
      -webkit-user-select: none;
    }

    /* 旋转屏提示层：仅在移动端竖屏时触发 */
    #orientation-warning {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-dark);
      z-index: 9999;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }
    
    #orientation-warning img {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      filter: invert(1);
      animation: rotateIcon 2s ease-in-out infinite;
    }

    @keyframes rotateIcon {
      0% { transform: rotate(0deg); }
      50% { transform: rotate(-90deg); }
      100% { transform: rotate(0deg); }
    }

    @media screen and (orientation: portrait) and (max-width: 900px) {
      #orientation-warning {
        display: flex;
      }
    }

    /* ==========================================================================
       2. 响应式 16:9 Canvas 视口布局 (Viewport Scaler)
       ========================================================================== */
    #viewport-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      position: relative;
    }

    #game-canvas {
      position: absolute;
      width: 1280px;
      height: 720px;
      background: #000;
      overflow: hidden;
      transform-origin: center center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
    }

    /* ==========================================================================
       3. 游戏场景图层组件 (Scene Layer Styling)
       ========================================================================== */
    
    /* 背景层：采用双层叠放，实现平滑交叉淡入淡出 */
    .bg-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: opacity 800ms ease-in-out;
      pointer-events: none;
      z-index: 1;
    }
    
    #bg-back {
      z-index: 1;
    }
    
    #bg-front {
      z-index: 2;
      opacity: 0;
    }

    /* 屏幕暗度暗角滤镜，提升沉浸感 */
    .vignette-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, transparent 40%, rgba(0, 0, 0, 0.4) 100%);
      pointer-events: none;
      z-index: 3;
    }

    .character-layer {
      position: absolute;
      bottom: 180px; /* 让立绘底部放置在对话框上方，避免被遮挡 */
      left: 0;
      width: 100%;
      height: calc(100% - 210px); /* 动态调优高度，防止超出画布 */
      z-index: 4;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
      padding: 0 50px;
    }

    .char-slot {
      width: 33%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      position: relative;
      transition: transform 450ms cubic-bezier(0.25, 0.8, 0.25, 1), opacity 450ms ease, filter 450ms ease;
      opacity: 0;
      transform: translateY(40px);
    }

    .char-slot.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* 非发言人自动暗淡并微缩 */
    .char-slot.dimmed {
      filter: brightness(0.45) contrast(0.9);
      transform: translateY(15px) scale(0.96);
    }

    .char-slot img {
      max-width: 90%;
      max-height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 15px 15px rgba(0,0,0,0.6));
    }

    /* ==========================================================================
       4. 对话框与排版 UI (Dialogue Box & Typography)
       ========================================================================== */
    .interactive-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 5;
      pointer-events: auto;
    }

    .dialogue-panel {
      position: absolute;
      bottom: 25px;
      left: 5%;
      width: 90%;
      height: 170px;
      border-radius: 16px;
      padding: 24px 35px;
      cursor: pointer;
      user-select: none;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .dialogue-panel:hover {
      border-color: rgba(255, 255, 255, 0.15);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), inset 0 0 15px rgba(255, 255, 255, 0.03);
    }

    /* 角色姓名框 */
    .speaker-tag {
      position: absolute;
      top: -24px;
      left: 30px;
      padding: 8px 24px;
      border-radius: 8px;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: #fff;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      border: 1px solid var(--glass-border);
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.8) 0%, rgba(236, 72, 153, 0.8) 100%);
      display: none; /* 无姓名时隐藏 */
    }

    /* 对话内容区 */
    .dialogue-text {
      font-size: 22px;
      line-height: 1.6;
      letter-spacing: 1px;
      color: var(--text-main);
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
      white-space: pre-wrap;
      overflow-y: auto;
      max-height: 100%;
      scrollbar-width: none; /* 隐藏滚动条 */
    }
    .dialogue-text::-webkit-scrollbar {
      display: none;
    }

    /* 推进点击指示符 */
    .click-indicator {
      position: absolute;
      bottom: 15px;
      right: 25px;
      width: 14px;
      height: 14px;
      border-bottom: 3px solid var(--primary-neon);
      border-right: 3px solid var(--primary-neon);
      transform: rotate(45deg);
      animation: pulseIndicator 1.2s ease-in-out infinite;
      display: none;
    }

    @keyframes pulseIndicator {
      0% { transform: rotate(45deg) translate(0, 0); opacity: 0.3; }
      50% { transform: rotate(45deg) translate(5px, 5px); opacity: 1; }
      100% { transform: rotate(45deg) translate(0, 0); opacity: 0.3; }
    }

    /* ==========================================================================
       5. 顶部导航与功能菜单 (Top Navigation Bar)
       ========================================================================== */
    .top-menu-bar {
      position: absolute;
      top: 20px;
      right: 35px;
      height: 44px;
      border-radius: 22px;
      display: flex;
      align-items: center;
      padding: 0 15px;
      z-index: 10;
      gap: 12px;
    }

    .menu-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-family);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 14px;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .menu-btn:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
    }

    .menu-btn.active {
      color: #fff;
      background: linear-gradient(135deg, var(--primary-neon), var(--accent-neon));
      box-shadow: 0 0 10px var(--primary-glow);
    }

    /* ==========================================================================
       6. 分支选项渲染叠加层 (Choices Overlay Layer)
       ========================================================================== */
    .choices-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 8;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(4px);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 22px;
    }

    .choice-button {
      width: 75%;
      min-height: 58px;
      padding: 14px 28px;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 500;
      text-align: center;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(20, 20, 32, 0.8);
      color: var(--text-main);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    .choice-button:hover {
      transform: scale(1.03);
      border-color: var(--primary-neon);
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.25) 0%, rgba(236, 72, 153, 0.15) 100%);
      box-shadow: 0 0 25px var(--primary-glow), inset 0 0 10px rgba(255,255,255,0.05);
    }
    
    .choice-button:active {
      transform: scale(0.98);
    }

    /* ==========================================================================
       7. 模态框叠加面板（历史记录、系统设置、存档读取）
       ========================================================================== */
    .overlay-panel {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 100;
      background: rgba(8, 8, 12, 0.85);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 60px;
    }

    .panel-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 15px;
      margin-bottom: 25px;
    }

    .panel-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 1.5px;
      background: linear-gradient(135deg, #fff 30%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .panel-close {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255,255,255,0.1);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.2s ease;
    }

    .panel-close:hover {
      background: var(--accent-neon);
      border-color: var(--accent-neon);
      transform: rotate(90deg);
    }

    /* 历史对话记录 */
    .log-list {
      width: 100%;
      flex: 1;
      overflow-y: auto;
      padding-right: 10px;
    }
    .log-list::-webkit-scrollbar {
      width: 6px;
    }
    .log-list::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 3px;
    }
    .log-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
    }
    .log-list::-webkit-scrollbar-thumb:hover {
      background: var(--primary-neon);
    }

    .log-item {
      margin-bottom: 20px;
      padding: 15px 20px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.03);
    }
    
    .log-speaker {
      font-weight: 700;
      color: var(--primary-neon);
      margin-bottom: 6px;
      font-size: 16px;
    }

    .log-speaker.narrator {
      color: var(--text-muted);
      font-style: italic;
    }

    .log-dialogue {
      font-size: 18px;
      line-height: 1.5;
      color: var(--text-main);
    }

    /* 存档 & 读档插槽列表 */
    .save-slot-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 25px;
      overflow-y: auto;
      padding: 10px 5px;
    }

    .save-slot {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 160px;
      position: relative;
    }

    .save-slot:hover {
      border-color: var(--primary-neon);
      background: rgba(255, 255, 255, 0.04);
      transform: translateY(-4px);
      box-shadow: 0 8px 25px rgba(168, 85, 247, 0.15);
    }

    .slot-meta {
      display: flex;
      justify-content: space-between;
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 10px;
    }

    .slot-info {
      flex: 1;
      font-size: 17px;
      line-height: 1.4;
      color: var(--text-main);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .slot-empty {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      color: var(--text-muted);
      font-size: 18px;
      letter-spacing: 1px;
    }
    
    .slot-date {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 10px;
      text-align: right;
    }

    /* 设置面板 */
    .settings-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 30px;
      max-width: 600px;
      margin: 40px auto;
    }

    .setting-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .setting-label {
      font-size: 20px;
      font-weight: 500;
    }

    .setting-control {
      display: flex;
      align-items: center;
      gap: 15px;
      width: 60%;
    }

    .setting-control input[type="range"] {
      flex: 1;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      outline: none;
      -webkit-appearance: none;
      accent-color: var(--primary-neon);
    }
    
    .setting-control span {
      width: 45px;
      text-align: right;
      font-size: 16px;
      font-family: 'Outfit', sans-serif;
    }

    /* ==========================================================================
       8. 极简唯美游戏标题屏 (Title Screen Layout)
       ========================================================================== */
    .title-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 200;
      background: radial-gradient(circle at center, #18142c 0%, #050409 100%);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 100px 50px 80px 50px;
      transition: opacity 1000ms ease;
    }

    /* 动态漂浮粒子特效底衬 */
    .title-particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      background: radial-gradient(circle, rgba(168,85,247,0.3) 0%, transparent 70%);
      border-radius: 50%;
      animation: floatUp infinite linear;
    }

    @keyframes floatUp {
      0% { transform: translateY(720px) scale(0.5); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
    }

    .game-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      z-index: 2;
    }

    .logo-main {
      font-size: 56px;
      font-weight: 800;
      letter-spacing: 6px;
      background: linear-gradient(135deg, #fff 0%, #d8b4fe 50%, var(--primary-neon) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 4px 20px rgba(168, 85, 247, 0.3);
      margin-bottom: 15px;
    }

    .logo-sub {
      font-size: 18px;
      letter-spacing: 8px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .title-buttons {
      display: flex;
      flex-direction: column;
      gap: 18px;
      width: 280px;
      z-index: 2;
    }

    .title-btn {
      padding: 15px 0;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 3px;
      color: #fff;
      border: 1px solid var(--glass-border);
      border-radius: 30px;
      background: var(--glass-bg);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      text-align: center;
    }

    .title-btn:hover {
      border-color: var(--primary-neon);
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.4) 0%, rgba(236, 72, 153, 0.2) 100%);
      box-shadow: 0 0 25px var(--primary-glow);
      transform: translateY(-2px);
    }
    
    .title-btn:active {
      transform: translateY(1px);
    }

    .title-footer {
      color: rgba(255,255,255,0.2);
      font-size: 12px;
      letter-spacing: 1.5px;
      z-index: 2;
    }

    /* ==========================================================================
       9. 提示与无剧本警告层 (Error & Warnings)
       ========================================================================== */
    .alert-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0d0d11;
      z-index: 99999;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #fff;
      padding: 40px;
      text-align: center;
    }

    .alert-box {
      max-width: 500px;
      padding: 35px;
      border-radius: 20px;
      border: 1px solid rgba(239, 68, 68, 0.2);
      background: rgba(239, 68, 68, 0.05);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .alert-box h2 {
      font-size: 26px;
      color: #ef4444;
      margin-bottom: 15px;
    }

    .alert-box p {
      font-size: 16px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 25px;
    }

    /* 通用玻璃板面样式类 */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(12px) saturate(180%);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.45);
    }
  </style>
</head>
<body>

  <!-- 竖屏强制翻转提示 -->
  <div id="orientation-warning">
    <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'><path d='M16.48 2.52c3.27 1.55 5.61 4.72 5.97 8.48h2c-.4-4.81-3.48-8.92-8-10.48l.03 2zm-8-.04l.03-2c-4.52 1.56-7.6 5.67-8 10.48h2c.36-3.76 2.7-6.93 5.97-8.48zM19 12h-2v5H7v-5H5v5c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2v-5zm-7 1.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z'/></svg>" alt="Rotate Screen">
    <h2 style="font-size: 20px; margin-bottom: 10px;">为了获得最佳沉浸体验</h2>
    <p style="color: var(--text-muted); font-size: 14px;">请将手机横屏放置旋转后再玩</p>
  </div>

  <!-- 无剧本友好警告层 -->
  <div id="script-alert-screen" class="alert-screen">
    <div class="alert-box">
      <h2>⚠️ 检测到剧本配置缺失</h2>
      <p>引擎未检测到合法的剧本JSON数据。请根据顶部注释中的“素材替换清单”配置您的游戏剧本 database。</p>
      <button class="title-btn" style="width: 150px;" onclick="window.location.reload()">重新载入</button>
    </div>
  </div>

  <!-- 视口缩放外包装 -->
  <div id="viewport-container">
    
    <!-- 16:9 游戏主画布 -->
    <div id="game-canvas">
      
      <!-- ==========================================
           A. 唯美游戏标题画面
           ========================================== -->
      <div id="title-screen" class="title-screen">
        <div class="title-particles" id="title-particles-container"></div>
        
        <div class="game-logo">

    // ==========================================
    // 3. 自适应画布缩放核心逻辑 (Canvas Scaling)
    // ==========================================
    function resizeGameCanvas() {
      const baseWidth = 1280;
      const baseHeight = 720;
      const windowWidth = window.innerWidth;
      const windowHeight = window.innerHeight;
      
      // 计算长宽最佳比率
      const scale = Math.min(windowWidth / baseWidth, windowHeight / baseHeight);
      
      // 依靠 CSS Transform matrix 矩阵缩放并居中
      dom.canvas.style.transform = `translate(-50%, -50%) scale(${scale})`;
      dom.canvas.style.left = '50%';
      dom.canvas.style.top = '50%';
    }

    window.addEventListener('resize', resizeGameCanvas);
    window.addEventListener('load', resizeGameCanvas);

    // ==========================================
    // 4. 工具模块 (Helper Utilities)
    // ==========================================
    
    // 素材智能路径解析（适应不同的开发部署路径）
    function getMappedAssetPath(type, rawPath) {
      if (!rawPath) return '';
      // 如果本来就是 Hex 颜色字符，不进行转换
      if (rawPath.startsWith('#')) return rawPath;
      if (rawPath.startsWith('data:') || rawPath.startsWith('http')) return rawPath;
      
      // 提取文件名
      const parts = rawPath.split('/');
      const filename = parts[parts.length - 1];
      
      // 拼接当前环境设定的目录路径
      return (ASSET_PATH_PREFIX[type] || './') + filename;
    }

    // 智能提取立绘关联姓名
    function getCharacterNameByFilename(path) {
      if (!path) return '';
      const filename = path.split('/').pop().split('.')[0];
      const nameMap = {
        'jpg0': '我',
        'jpg1': '阿姨',
        'jpg2': '清欢',
        'jpg3': '李哥',
        'jpg4': '张哥',
        'jpg5': '咸鱼'
      };
      return nameMap[filename] || '';
    }

    // 执行安全表达式判定 (安全求值旗帜条件)
    function evalCondition(condStr) {
      if (!condStr) return true;
      try {
        // 构建独立沙箱求值
        const evalFunc = new Function('flags', `with(flags) { return (${condStr}); }`);
        return evalFunc(state.flags);
      } catch (e) {
        console.error("Condition eval failed:", condStr, e);
        return false;
      }
    }

    // 短音效播放
    function playSE(src) {
      if (!src) return;
      const mapped = getMappedAssetPath('se', src);
      dom.audioSe.src = mapped;
      dom.audioSe.volume = settings.seVolume;
      dom.audioSe.play().catch(e => console.log("SE blocked:", e));
    }

    // ==========================================
    // 5. 音频淡入淡出组件 (Audio Fading Engine)
    // ==========================================
    let currentBgmFile = "";

    function playBGM(src) {
      if (!src) {
        fadeBgmOut();
        currentBgmFile = "";
        return;
      }
      
      const mapped = getMappedAssetPath('bgm', src);
      if (currentBgmFile === mapped) return; // 相同背景音乐不打断
      currentBgmFile = mapped;

      fadeBgmOut(() => {
        dom.audioBgm.src = mapped;
        dom.audioBgm.volume = 0;
        dom.audioBgm.play().then(() => {
          fadeBgmIn();
        }).catch(e => {
          console.log("BGM autoplay blocked. Waiting for click.");
        });
      });
    }

    function fadeBgmOut(callback) {
      const step = 0.05;
      const interval = 30;
      const fadeOutTimer = setInterval(() => {
        if (dom.audioBgm.volume > step) {
          dom.audioBgm.volume = Math.max(0, dom.audioBgm.volume - step);
        } else {
          dom.audioBgm.volume = 0;
          dom.audioBgm.pause();
          clearInterval(fadeOutTimer);
          if (callback) callback();
        }
      }, interval);
    }

    function fadeBgmIn() {
      const step = 0.05;
      const interval = 30;
      dom.audioBgm.play().catch(()=>{});
      const fadeInTimer = setInterval(() => {
        if (dom.audioBgm.volume < settings.bgmVolume - step) {
          dom.audioBgm.volume = Math.min(settings.bgmVolume, dom.audioBgm.volume + step);
        } else {
          dom.audioBgm.volume = settings.bgmVolume;
          clearInterval(fadeInTimer);
        }
      }, interval);
    }

    // ==========================================
    // 6. 核心游戏循环与渲染引擎 (Game Loop & Renderer)
    // ==========================================
    
    // 初始化检查剧本
    function checkScriptIntegrity() {
      if (!gameScript || !gameScript.scenes || gameScript.scenes.length === 0) {
        dom.scriptAlert.style.display = 'flex';
        return false;
      }
      return true;
    }

    // 根据 ID 获取剧本场景节点
    function getSceneNode(id) {
      return gameScript.scenes.find(s => s.id === id);
    }

    // 核心渲染函数：更新整个游戏视图
    function renderScene(sceneId) {
      // 重置定时器与清空
      clearTimeout(autoTimer);
      state.currentSceneId = sceneId;
      
      const scene = getSceneNode(sceneId);
      if (!scene) {
        console.error("Scene node not found:", sceneId);
        return;
      }

      // 1. 背景切换控制（双通道平滑淡入淡出）
      updateBackground(scene.bg);

      // 2. 背景音乐切换
      if (scene.bgm !== undefined) {
        playBGM(scene.bgm);
      }

      // 3. 播放关联音效
      if (scene.se) {
        playSE(scene.se);
      }

      // 4. 立绘高亮与切换渲染
      updateCharacters(scene);

      // 5. 对话名字判定与显示
      if (scene.speaker_name) {
        dom.speakerTag.textContent = scene.speaker_name;
        dom.speakerTag.style.display = 'block';
      } else {
        dom.speakerTag.style.display = 'none';
      }

      // 6. 打字机对话文字载入
      fullDialogueText = scene.dialogue || "";
      visibleTextLength = 0;
      dom.arrowIndicator.style.display = 'none';

      // 存入往期日志
      if (fullDialogueText) {
        // 避开空节点
        addHistoryLog(scene.speaker_name, fullDialogueText);
      }

      // 显示对话框
      dom.dialoguePanel.style.display = (fullDialogueText === "" && !scene.choices) ? 'none' : 'flex';

      startTypewriter(scene);
    }

    // 双层背景淡入淡出算法
    let currentBgSrc = "";
    function updateBackground(bgValue) {
      if (!bgValue) return;

      // 判断是纯色还是图片路径
      const isColor = bgValue.startsWith('#');
      const targetStyle = isColor ? bgValue : `url('${getMappedAssetPath('bg', bgValue)}')`;
      
      if (currentBgSrc === targetStyle) return;
      currentBgSrc = targetStyle;

      // 载入新图在顶层，执行渐显
      if (isColor) {
        dom.bgFront.style.backgroundImage = 'none';
        dom.bgFront.style.backgroundColor = bgValue;
      } else {
        dom.bgFront.style.backgroundColor = 'transparent';
        dom.bgFront.style.backgroundImage = targetStyle;
      }
      
      dom.bgFront.style.opacity = 0;
      
      // 强制触发重绘
      dom.bgFront.offsetWidth;

      // 前景层透明度变为 1
      dom.bgFront.style.opacity = 1;

      // 渐变过渡结束，将内容同步给背景层，复原前景
      setTimeout(() => {
        if (isColor) {
          dom.bgBack.style.backgroundImage = 'none';
          dom.bgBack.style.backgroundColor = bgValue;
        } else {
          dom.bgBack.style.backgroundColor = 'transparent';
          dom.bgBack.style.backgroundImage = targetStyle;
        }
        dom.bgFront.style.opacity = 0;
      }, 850);
    }

    // 立绘三方位智能渲染与发言人自动对比灰度高亮
    function updateCharacters(scene) {
      renderSingleSlot(dom.charLeft, scene.left_character, scene.left_character_active, scene.speaker_name);
      // 支持 center_character 扩展槽
      renderSingleSlot(dom.charCenter, scene.center_character, scene.center_character_active, scene.speaker_name);
      renderSingleSlot(dom.charRight, scene.right_character, scene.right_character_active, scene.speaker_name);
    }

    function renderSingleSlot(slotElement, imgName, explicitActive, speakerName) {
      if (!imgName) {
        // 淡出并清除
        slotElement.classList.remove('visible');
        return;
      }

      const mappedUrl = getMappedAssetPath('char', imgName);
      
      // 更新图片
      let img = slotElement.querySelector('img');
      if (!img) {
        img = document.createElement('img');
        slotElement.appendChild(img);
      }
      
      if (img.getAttribute('src') !== mappedUrl) {
        img.src = mappedUrl;
      }

      slotElement.classList.add('visible');

      // 判定高亮亮暗:
      // 如果脚本显示配置了立绘激活状态，优先听从脚本。
      // 否则判定该立绘映射的姓名是否等于当前发言人。
      let isActive = false;
      if (explicitActive !== undefined) {
        isActive = explicitActive;
      } else if (speakerName) {
        const spriteName = getCharacterNameByFilename(imgName);
        isActive = (spriteName === speakerName);
      } else {
        // 如果是旁白，所有角色暗淡
        isActive = false;
      }

      if (isActive) {
        slotElement.classList.remove('dimmed');
        slotElement.style.zIndex = 5; // 浮于顶端层
      } else {
        slotElement.classList.add('dimmed');
        slotElement.style.zIndex = 4;
      }
    }

    // 打字机逻辑
    function startTypewriter(scene) {
      clearInterval(typingTimer);
      state.isTyping = true;

      // 如果开启了 Skip 已读文本，强制打字速度为0直接展示
      const textSpeed = state.skipMode ? 0 : 30; // 每字30毫秒

      if (textSpeed === 0 || fullDialogueText === "") {
        dom.dialogueText.textContent = fullDialogueText;
        onTypewriterComplete(scene);
        return;
      }

      typingTimer = setInterval(() => {
        visibleTextLength++;
        dom.dialogueText.textContent = fullDialogueText.substring(0, visibleTextLength);
        
        if (visibleTextLength >= fullDialogueText.length) {
          onTypewriterComplete(scene);
        }
      }, textSpeed);
    }

    // 快捷跳过/展示全文
    function finishTypewriterInstantly(scene) {
      clearInterval(typingTimer);
      dom.dialogueText.textContent = fullDialogueText;
      onTypewriterComplete(scene);
    }

    function onTypewriterComplete(scene) {
      clearInterval(typingTimer);
      state.isTyping = false;
      dom.arrowIndicator.style.display = 'block';

      // 选项分支渲染
      if (scene.choices && scene.choices.length > 0) {
        renderChoices(scene.choices);
        return;
      }

      // 如果开启了自动播放(AUTO)，等待设定延时后自动前进
      if (state.autoMode && !state.skipMode) {
        const delay = Math.max(1200, fullDialogueText.length * 70); // 智能按长度留存停顿
        autoTimer = setTimeout(() => {
          advanceText();
        }, delay);
      } else if (state.skipMode) {
        // Skip 模式极速飞跃
        autoTimer = setTimeout(() => {
          advanceText();
        }, 80);
      }
    }

    // 渲染分支剧情选项
    function renderChoices(choices) {
      dom.choicesOverlay.innerHTML = "";
      let visibleChoicesCount = 0;

      choices.forEach(c => {
        // 判定分支解锁条件 (flag_love == true 类似表达式判定)
        const isUnlocked = evalCondition(c.condition);
        
        if (isUnlocked) {
          visibleChoicesCount++;
          const btn = document.createElement('div');
          btn.className = "choice-button glass-panel";
          btn.textContent = c.text;
          
          btn.addEventListener('click', (e) => {
            e.stopPropagation(); // 阻止穿透引发对话前进
            
            // 播放点击音效
            playSE('click.mp3'); 
            
            // 设定状态旗帜
            if (c.set_flags) {
              for (const [fKey, fValue] of Object.entries(c.set_flags)) {
                state.flags[fKey] = fValue;
              }
            }
            
            // 选项隐藏
            dom.choicesOverlay.style.display = 'none';
            
            // 走向分支终点场景
            renderScene(c.next);
          });
          dom.choicesOverlay.appendChild(btn);
        }
      });

      if (visibleChoicesCount > 0) {
        // 展示分支盘
        dom.choicesOverlay.style.display = 'flex';
      } else {
        // 均被旗帜锁住，跳往保底出口
        console.warn("All choices locked. Routing automatically.");
      }
    }

    // 用户推进对话核心机制 (Space/点击动作)
    function advanceText() {
      // 被选项遮挡时，屏蔽直接前进
      if (dom.choicesOverlay.style.display === 'flex') return;

      const scene = getSceneNode(state.currentSceneId);
      if (!scene) return;

      if (state.isTyping) {
        // 正在打字时点击，瞬间补完文本
        finishTypewriterInstantly(scene);
      } else {
        // 已显示完当前文字，进入下一个路由
        if (scene.is_ending) {
          // 结局节点，点击重返标题
          exitToTitle();
          return;
        }

        // 判定条件路由 next_if
        if (scene.next_if && scene.next_if.length > 0) {
          for (const route of scene.next_if) {
            if (evalCondition(route.condition)) {
              renderScene(route.next);
              return;
            }
          }
        }

        // 常规顺序路由
        if (scene.next) {
          renderScene(scene.next);
        } else {
          console.warn("Narrative reached dead end node.");
        }
      }
    }

    // ==========================================
    // 7. UI 控制层与控制菜单功能 (UI Functions)
    // ==========================================
    
    // 开始新游戏
    function startNewGame() {
      playSE('start.mp3');
      // 重置全局旗帜
      state.flags = {
        flag_dj: false,
        flag_polite: false,
        flag_exhausted: false
      };
      state.logHistory = [];
      state.autoMode = false;
      state.skipMode = false;
      updateTopBarButtonStates();
      
      // 隐藏标题，加载首个场景
      dom.titleScreen.style.opacity = 0;
      setTimeout(() => {
        dom.titleScreen.style.display = 'none';
        dom.gameTopBar.style.display = 'flex';
        dom.interactiveScreen = document.getElementById('game-interactive-layer');
        dom.interactiveScreen.style.display = 'block';
        renderScene('s1_init');
      }, 600);
    }

    // 继续游戏 (读取自动存档或最新的存档)
    function continueGame() {
      const savedDataStr = localStorage.getItem('gal_slot_auto');
      if (savedDataStr) {
        playSE('click.mp3');
        loadGameData('auto');
        dom.titleScreen.style.display = 'none';
        dom.gameTopBar.style.display = 'flex';
        document.getElementById('game-interactive-layer').style.display = 'block';
      } else {
        alert("暂无自动存档或旧的开篇记录！");
      }
    }

    // 退出重回菜单
    function exitToTitle() {
      playSE('click.mp3');
      // 停止自动和跳过
      state.autoMode = false;
      state.skipMode = false;
      updateTopBarButtonStates();
      
      dom.gameTopBar.style.display = 'none';
      document.getElementById('game-interactive-layer').style.display = 'none';
      dom.choicesOverlay.style.display = 'none';
      
      // 立绘全隐藏
      dom.charLeft.classList.remove('visible');
      dom.charCenter.classList.remove('visible');
      dom.charRight.classList.remove('visible');

      // 背景淡入纯黑
      updateBackground('#050409');
      playBGM('');

      dom.titleScreen.style.display = 'flex';
      dom.titleScreen.offsetHeight; // force reflow
      dom.titleScreen.style.opacity = 1;
    }

    // 往期回滚日志历史收集
    function addHistoryLog(speaker, text) {
      // 限制 100 条日志
      if (state.logHistory.length > 100) {
        state.logHistory.shift();
      }
      state.logHistory.push({ speaker, text });
    }

    function showLogPanel() {
      playSE('click.mp3');
      dom.logContainer.innerHTML = "";
      
      if (state.logHistory.length === 0) {
        dom.logContainer.innerHTML = '<div class="slot-empty">暂无对话记录</div>';
      } else {
        state.logHistory.forEach(h => {
          const item = document.createElement('div');
          item.className = "log-item";
          
          const spkr = document.createElement('div');
          spkr.className = "log-speaker" + (h.speaker ? "" : " narrator");
          spkr.textContent = h.speaker || "旁白";
          
          const txt = document.createElement('div');
          txt.className = "log-dialogue";
          txt.textContent = h.text;
          
          item.appendChild(spkr);
          item.appendChild(txt);
          dom.logContainer.appendChild(item);
        });
      }
      
      dom.logOverlay.style.display = 'flex';
      // 自动滚至日志底端
      dom.logContainer.scrollTop = dom.logContainer.scrollHeight;
    }

    // ==========================================
    // 8. 存读档系统 (Save & Load Core)
    // ==========================================
    
    // 打开存盘或读盘浮窗
    function openSaveLoadPanel(mode) {
      playSE('click.mp3');
      dom.saveLoadTitle.textContent = mode === 'save' ? "保存游戏进度" : "读取游戏进度";
      dom.slotsContainer.innerHTML = "";

      // 提供 4 个存档卡槽
      for (let i = 1; i <= 4; i++) {
        const slotKey = `gal_slot_${i}`;
        const slotDataStr = localStorage.getItem(slotKey);
        
        const slot = document.createElement('div');
        slot.className = "save-slot";
        
        if (slotDataStr) {
          const sData = JSON.parse(slotDataStr);
          const scene = getSceneNode(sData.sceneId);
          const bgmText = scene ? (scene.speaker_name ? `【${scene.speaker_name}】` : "") + scene.dialogue.substring(0, 25) + "..." : "未知节点";
          
          slot.innerHTML = `
            <div class="slot-meta">
              <span>插槽 ${i}</span>
              <span style="color: var(--primary-neon); font-weight:bold;">已存</span>
            </div>
            <div class="slot-info">${bgmText}</div>
            <div class="slot-date">${sData.date}</div>
          `;
          
          slot.addEventListener('click', () => {
            if (mode === 'save') {
              saveGameData(i);
            } else {
              loadGameData(i);
            }
          });
        } else {
          slot.innerHTML = `
            <div class="slot-meta"><span>插槽 ${i}</span></div>
            <div class="slot-empty">无存档数据</div>
          `;
          slot.addEventListener('click', () => {
            if (mode === 'save') {
              saveGameData(i);
            } else {
              alert("当前无数据可供加载！");
            }
          });
        }
        dom.slotsContainer.appendChild(slot);
      }
      dom.saveLoadOverlay.style.display = 'flex';
    }

    function saveGameData(slotIndex) {
      playSE('save.mp3');
      const now = new Date();
      const dateString = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
      
      const saveData = {
        sceneId: state.currentSceneId,
        flags: state.flags,
        logHistory: state.logHistory,
        date: dateString
      };

      localStorage.setItem(`gal_slot_${slotIndex}`, JSON.stringify(saveData));
      
      // 同时存为自动读档存档
      localStorage.setItem(`gal_slot_auto`, JSON.stringify(saveData));
      
      dom.saveLoadOverlay.style.display = 'none';
      alert(`进度已保存至 插槽 ${slotIndex}！`);
    }

    function loadGameData(slotIndex) {
      const slotKey = slotIndex === 'auto' ? 'gal_slot_auto' : `gal_slot_${slotIndex}`;
      const savedDataStr = localStorage.getItem(slotKey);
      if (!savedDataStr) return;

      playSE('load.mp3');
      const sData = JSON.parse(savedDataStr);
      
      state.currentSceneId = sData.sceneId;
      state.flags = sData.flags;
      state.logHistory = sData.logHistory || [];
      state.autoMode = false;
      state.skipMode = false;
      updateTopBarButtonStates();

      // 对话框及面板还原
      dom.choicesOverlay.style.display = 'none';
      dom.saveLoadOverlay.style.display = 'none';
      
      renderScene(state.currentSceneId);
    }

    // ==========================================
    // 9. 自动播放与快速跳过逻辑 (Auto/Skip Control)
    // ==========================================
    function toggleAutoPlay() {
      playSE('click.mp3');
      state.autoMode = !state.autoMode;
      if (state.autoMode) {
        state.skipMode = false; // 互斥
        // 若当前不在打字，直接触发前进
        if (!state.isTyping) {
          advanceText();
        }
      } else {
        clearTimeout(autoTimer);
      }
      updateTopBarButtonStates();
    }

    function toggleSkipMode() {
      playSE('click.mp3');
      state.skipMode = !state.skipMode;
      if (state.skipMode) {
        state.autoMode = false;
        if (!state.isTyping) {
          advanceText();
        } else {
          const scene = getSceneNode(state.currentSceneId);
          if (scene) finishTypewriterInstantly(scene);
        }
      } else {
        clearTimeout(autoTimer);
      }
      updateTopBarButtonStates();
    }

    function updateTopBarButtonStates() {
      if (state.autoMode) dom.btnAuto.classList.add('active');
      else dom.btnAuto.classList.remove('active');

      if (state.skipMode) dom.btnSkip.classList.add('active');
      else dom.btnSkip.classList.remove('active');
    }

    // ==========================================
    // 10. 设置面板与音量设定 (Settings Control)
    // ==========================================
    function initSettings() {
      // 从缓存读取音量设置
      const cacheBgm = localStorage.getItem('gal_bgm_vol');
      const cacheSe = localStorage.getItem('gal_se_vol');
      if (cacheBgm !== null) settings.bgmVolume = parseFloat(cacheBgm);
      if (cacheSe !== null) settings.seVolume = parseFloat(cacheSe);

      dom.sliderBgm.value = settings.bgmVolume;
      dom.sliderSe.value = settings.seVolume;
      
      dom.labelBgm.textContent = `${Math.round(settings.bgmVolume * 100)}%`;
      dom.labelSe.textContent = `${Math.round(settings.seVolume * 100)}%`;
      
      dom.audioBgm.volume = settings.bgmVolume;
      dom.audioSe.volume = settings.seVolume;
    }

    function updateSettingsLabels() {
      dom.labelBgm.textContent = `${Math.round(dom.sliderBgm.value * 100)}%`;
      dom.labelSe.textContent = `${Math.round(dom.sliderSe.value * 100)}%`;
    }

    function saveSettings() {
      playSE('click.mp3');
      settings.bgmVolume = parseFloat(dom.sliderBgm.value);
      settings.seVolume = parseFloat(dom.sliderSe.value);
      
      localStorage.setItem('gal_bgm_vol', settings.bgmVolume);
      localStorage.setItem('gal_se_vol', settings.seVolume);
      
      dom.audioBgm.volume = settings.bgmVolume;
      dom.audioSe.volume = settings.seVolume;
      
      dom.settingsOverlay.style.display = 'none';
    }

    // ==========================================
    // 11. 交互绑定与启动监听 (Event Listeners Setup)
    // ==========================================
    
    // 初始化标题漂浮粒子装饰 (CSS-driven dynamic particles)
    function createTitleParticles() {
      dom.titleParticles.innerHTML = "";
      const particleCount = 20;
      for (let i = 0; i < particleCount; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        
        // 随机参数分配
        const size = Math.random() * 40 + 10;
        p.style.width = `${size}px`;
        p.style.height = `${size}px`;
        p.style.left = `${Math.random() * 100}%`;
        p.style.animationDuration = `${Math.random() * 8 + 4}s`;
        p.style.animationDelay = `${Math.random() * 5}s`;
        
        dom.titleParticles.appendChild(p);
      }
    }

    function setupEventListeners() {
      // 标题按钮组
      dom.btnStartGame.addEventListener('click', startNewGame);
      dom.btnContinueGame.addEventListener('click', continueGame);
      
      dom.btnShowSettings.addEventListener('click', () => {
        playSE('click.mp3');
        dom.settingsOverlay.style.display = 'flex';
      });

      // 游戏大区交互：点击/触摸对话框推进
      dom.dialoguePanel.addEventListener('click', (e) => {
        // 自动播放时点击则打断，常规流程直接推进
        if (state.autoMode) {
          state.autoMode = false;
          updateTopBarButtonStates();
          clearTimeout(autoTimer);
        }
        advanceText();
      });

      // 键盘空格/回车推进逻辑 (PC 辅助)
      document.addEventListener('keydown', (e) => {
        // 标题屏时不可敲击键盘推进
        if (dom.titleScreen.style.display !== 'none') return;
        // 蒙版浮层打开时禁止推进
        if (dom.logOverlay.style.display === 'flex' || 
            dom.saveLoadOverlay.style.display === 'flex' || 
            dom.settingsOverlay.style.display === 'flex') return;

        if (e.code === 'Space' || e.code === 'Enter') {
          e.preventDefault();
          advanceText();
        }
      });

      // 顶部操控条
      dom.btnAuto.addEventListener('click', toggleAutoPlay);
      dom.btnSkip.addEventListener('click', toggleSkipMode);
      dom.btnShowLog.addEventListener('click', showLogPanel);
      
      dom.btnSave.addEventListener('click', () => openSaveLoadPanel('save'));
      dom.btnLoad.addEventListener('click', () => openSaveLoadPanel('load'));
      dom.btnMenu.addEventListener('click', exitToTitle);

      // 关闭浮层按钮
      dom.btnCloseLog.addEventListener('click', () => {
        playSE('click.mp3');
        dom.logOverlay.style.display = 'none';
      });

      dom.btnCloseSaveLoad.addEventListener('click', () => {
        playSE('click.mp3');
        dom.saveLoadOverlay.style.display = 'none';
      });

      dom.sliderBgm.addEventListener('input', updateSettingsLabels);
      dom.sliderSe.addEventListener('input', updateSettingsLabels);
      dom.btnSaveSettings.addEventListener('click', saveSettings);
      dom.btnCloseSettings.addEventListener('click', () => {
        playSE('click.mp3');
        dom.settingsOverlay.style.display = 'none';
      });
      
      // 检测是否存在自动存档供标题页高亮按钮显示
      const autoSave = localStorage.getItem('gal_slot_auto');
      if (!autoSave) {
        dom.btnContinueGame.style.opacity = 0.5;
        dom.btnContinueGame.style.cursor = 'not-allowed';
      }
    }

    // ==========================================
    // 12. 引擎初始化加载入口 (App Bootloader)
    // ==========================================
    function bootEngine() {
      // 1. 检验剧本文件完整度
      if (!checkScriptIntegrity()) return;

      // 2. 初始化自适应缩放
      resizeGameCanvas();

      // 3. 构建漂浮美化装饰
      createTitleParticles();

      // 4. 读取音量设置
      initSettings();

      // 5. 绑定UI响应事件
      setupEventListeners();
    }

    // 运行引导
    bootEngine();
  </script>
</body>
